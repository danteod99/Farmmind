<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; font-family: sans-serif; color: white; padding: 40px; }
.section { margin-bottom: 40px; }
.label { color: #4b5563; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
.navbar {
  background: #111827; border: 1px solid #1f2937; border-radius: 10px;
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
}
.sidebar-wrap { display: flex; border: 1px solid #1f2937; border-radius: 10px; overflow: hidden; max-width: 600px; }
.sidebar { width: 200px; background: #0a0f1e; padding: 20px 14px; }
.sidebar-logo-wrap { margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid #1e293b; }
.sidebar-item { padding: 9px 12px; border-radius: 6px; font-size: 13px; color: #64748b; margin-bottom: 3px; }
.sidebar-item.active { background: #1e3a5f; color: #60a5fa; }
.main-content { flex: 1; background: #111827; padding: 24px; }
.main-content h3 { font-size: 16px; margin-bottom: 8px; }
.main-content p { color: #6b7280; font-size: 13px; }
.sizes { display: flex; gap: 30px; align-items: flex-end; flex-wrap: wrap; }
.size-box { text-align: center; }
.size-box span { display: block; color: #374151; font-size: 11px; margin-top: 6px; }
.bg-box { background: #1e293b; padding: 12px 20px; border-radius: 8px; display: inline-block; }

/* THE LOGO via inline SVG */
.logo-svg { display: block; }
</style>
</head>
<body>

<div class="section">
  <div class="label">Navbar del panel</div>
  <div class="navbar">
    <svg class="logo-svg" viewBox="0 0 240 70" width="120" height="52">
      <text x="120" y="48" text-anchor="middle"
        font-family="'Arial Black', Impact, sans-serif"
        font-weight="900" font-size="52" letter-spacing="-1" fill="#9CA3AF">TRUST</text>
      <text x="122" y="64" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-weight="700" font-size="14" letter-spacing="5"
        fill="#A855F7" opacity="0.6">MIND</text>
      <text x="120" y="64" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-weight="700" font-size="14" letter-spacing="5"
        fill="#22D3EE" opacity="0.8">MIND</text>
      <text x="120" y="64" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-weight="700" font-size="14" letter-spacing="5"
        fill="#e2e8f0">MIND</text>
    </svg>
    <div style="display:flex;gap:20px">
      <span style="color:#9ca3af;font-size:14px">Servicios</span>
      <span style="color:#9ca3af;font-size:14px">Órdenes</span>
      <span style="color:#9ca3af;font-size:14px">Fondos</span>
    </div>
    <button style="background:#2563eb;color:white;border:none;padding:8px 14px;border-radius:6px;font-size:13px">Mi cuenta</button>
  </div>
</div>

<div class="section">
  <div class="label">Sidebar del panel SMM</div>
  <div class="sidebar-wrap">
    <div class="sidebar">
      <div class="sidebar-logo-wrap">
        <svg class="logo-svg" viewBox="0 0 240 70" width="130" height="56">
          <text x="120" y="48" text-anchor="middle"
            font-family="'Arial Black', Impact, sans-serif"
            font-weight="900" font-size="52" letter-spacing="-1" fill="#9CA3AF">TRUST</text>
          <text x="122" y="64" text-anchor="middle"
            font-family="'Courier New', monospace"
            font-weight="700" font-size="14" letter-spacing="5"
            fill="#A855F7" opacity="0.6">MIND</text>
          <text x="120" y="64" text-anchor="middle"
            font-family="'Courier New', monospace"
            font-weight="700" font-size="14" letter-spacing="5"
            fill="#22D3EE" opacity="0.8">MIND</text>
          <text x="120" y="64" text-anchor="middle"
            font-family="'Courier New', monospace"
            font-weight="700" font-size="14" letter-spacing="5"
            fill="#e2e8f0">MIND</text>
        </svg>
      </div>
      <div class="sidebar-item active">📦 Servicios</div>
      <div class="sidebar-item">📋 Órdenes</div>
      <div class="sidebar-item">💳 Fondos</div>
      <div class="sidebar-item">👤 Perfil</div>
    </div>
    <div class="main-content">
      <h3>Panel de Servicios</h3>
      <p>Así se ve el logo en el sidebar del panel de usuario.</p>
    </div>
  </div>
</div>

<div class="section">
  <div class="label">Diferentes tamaños</div>
  <div class="sizes">
    <div class="size-box">
      <div class="bg-box">
        <svg viewBox="0 0 240 70" width="80" height="32">
          <text x="120" y="48" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-weight="900" font-size="52" letter-spacing="-1" fill="#9CA3AF">TRUST</text>
          <text x="120" y="64" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="14" letter-spacing="5" fill="#22D3EE" opacity="0.8">MIND</text>
          <text x="120" y="64" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="14" letter-spacing="5" fill="#e2e8f0">MIND</text>
        </svg>
      </div>
      <span>Mini (32px)</span>
    </div>
    <div class="size-box">
      <div class="bg-box">
        <svg viewBox="0 0 240 70" width="120" height="48">
          <text x="120" y="48" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-weight="900" font-size="52" letter-spacing="-1" fill="#9CA3AF">TRUST</text>
          <text x="120" y="64" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="14" letter-spacing="5" fill="#22D3EE" opacity="0.8">MIND</text>
          <text x="120" y="64" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="14" letter-spacing="5" fill="#e2e8f0">MIND</text>
        </svg>
      </div>
      <span>Navbar (48px)</span>
    </div>
    <div class="size-box">
      <div class="bg-box">
        <svg viewBox="0 0 240 70" width="180" height="72">
          <text x="120" y="48" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-weight="900" font-size="52" letter-spacing="-1" fill="#9CA3AF">TRUST</text>
          <text x="120" y="64" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="14" letter-spacing="5" fill="#22D3EE" opacity="0.8">MIND</text>
          <text x="120" y="64" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="14" letter-spacing="5" fill="#e2e8f0">MIND</text>
        </svg>
      </div>
      <span>Hero/Landing (72px)</span>
    </div>
  </div>
</div>

</body>
</html>
